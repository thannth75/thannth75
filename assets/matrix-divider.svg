<svg width="1200" height="120" viewBox="0 0 1200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff41" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .code{font: 16px monospace; fill:#00ff41; opacity:.55}
      .line{stroke:url(#g); stroke-width:2; filter:url(#glow)}
