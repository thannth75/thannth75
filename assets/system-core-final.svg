<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFE58A"/>
      <stop offset="0.45" stop-color="#F7C948"/>
      <stop offset="1" stop-color="#B7791F"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" x2="1200" y1="0" y2="0">
      <stop offset="0" stop-color="#00FF41"/>
      <stop offset="0.52" stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#F7C948"/>
    </linearGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="18" fill="#0D1117"/>
  <rect x="1.5" y="1.5" width="1197" height="297" rx="18" fill="none" stroke="url(#neon)" stroke-width="2" opacity="0.45"/>

  <g opacity="0.14" font-family="JetBrains Mono, Consolas, monospace" fill="#00FF41" font-size="13">
    <text x="34" y="282">01001110 01010000 // SYSTEM_STATUS // BUILD_AUTOMATE_DEFEND // ACCESS_GRANTED</text>
    <text x="760" y="34">nathan@np-dev:~$ system --status</text>
  </g>

  <!-- Left status card -->
  <g transform="translate(34 42)">
    <rect width="390" height="215" rx="16" fill="#050505" stroke="#00FF41" stroke-opacity="0.85"/>
    <text x="26" y="40" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" fill="#00FF41">&gt;_ SYSTEM STATUS</text>

    <g font-family="JetBrains Mono, Consolas, monospace" font-size="14">
      <text x="26" y="78" fill="#C9D1D9">Focus</text>
      <rect x="148" y="65" width="170" height="12" rx="6" fill="#10251B"/>
      <rect x="148" y="65" width="170" height="12" rx="6" fill="#00FF41" filter="url(#greenGlow)"/>
      <text x="332" y="77" fill="#00FF41">100%</text>

      <text x="26" y="112" fill="#C9D1D9">Motivation</text>
      <rect x="148" y="99" width="170" height="12" rx="6" fill="#10251B"/>
      <rect x="148" y="99" width="170" height="12" rx="6" fill="#00FF41" filter="url(#greenGlow)"/>
      <text x="332" y="111" fill="#00FF41">100%</text>

      <text x="26" y="146" fill="#C9D1D9">Execution</text>
      <rect x="148" y="133" width="170" height="12" rx="6" fill="#10251B"/>
      <rect x="148" y="133" width="150" height="12" rx="6" fill="#F7C948" filter="url(#greenGlow)"/>
      <text x="332" y="145" fill="#F7C948">89%</text>

      <text x="26" y="180" fill="#C9D1D9">Bugs Today</text>
      <text x="148" y="180" fill="#00FF41">0</text>

      <text x="26" y="204" fill="#C9D1D9">Uptime</text>
      <text x="148" y="204" fill="#00FF41">24/7</text>
    </g>
  </g>

  <!-- Center brand core -->
  <g transform="translate(465 30)">
    <rect x="33" y="0" width="204" height="240" rx="18" fill="#050505" stroke="#263647"/>
    <rect x="78" y="28" width="114" height="114" rx="24" fill="#050505" stroke="url(#gold)" stroke-width="3" filter="url(#goldGlow)"/>
    <text x="135" y="103" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900" fill="url(#gold)" filter="url(#goldGlow)">NP</text>

    <text x="135" y="174" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="13" font-weight="800" fill="#FFFFFF" letter-spacing="2">BUILD</text>
    <text x="135" y="197" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="13" font-weight="800" fill="#00E5FF" letter-spacing="2">AUTOMATE</text>
    <text x="135" y="220" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="13" font-weight="800" fill="#F7C948" letter-spacing="2">DEFEND</text>
  </g>

  <!-- Right current card -->
  <g transform="translate(776 42)">
    <rect width="390" height="215" rx="16" fill="#050505" stroke="#00FF41" stroke-opacity="0.85"/>
    <text x="26" y="40" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" fill="#00FF41">&gt;_ CURRENTLY</text>

    <g font-family="JetBrains Mono, Consolas, monospace" font-size="14">
      <rect x="28" y="67" width="10" height="10" rx="2" fill="#00E5FF"/>
      <text x="55" y="77" fill="#C9D1D9">Building secure systems</text>

      <rect x="28" y="101" width="10" height="10" rx="2" fill="#00FF41"/>
      <text x="55" y="111" fill="#C9D1D9">Automating boring tasks</text>

      <rect x="28" y="135" width="10" height="10" rx="2" fill="#F7C948"/>
      <text x="55" y="145" fill="#C9D1D9">Exploring AI and data</text>

      <rect x="28" y="169" width="10" height="10" rx="2" fill="#00E5FF"/>
      <text x="55" y="179" fill="#C9D1D9">Creating real products</text>

      <text x="26" y="205" fill="#00FF41">nathan@np-dev:~$</text>
      <rect x="188" y="191" width="10" height="18" fill="#00FF41" filter="url(#greenGlow)"/>
    </g>
  </g>

  <line x1="34" y1="270" x2="1166" y2="270" stroke="url(#neon)" opacity="0.35"/>
</svg>